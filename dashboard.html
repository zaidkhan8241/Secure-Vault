<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureVault — Your Vault</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
 
<div class="dash-root">

  <!-- ══════════ TOPBAR ══════════ -->
  <header class="topbar">
    <div class="top-logo">
      <i class="fas fa-shield-halved"></i>
      Secure<em>Vault</em>
    </div>
 
    <div class="top-user">
      <div class="top-avatar" id="topAvatar">??</div>
      <span id="topName">User</span>
    </div>
 
    <button class="top-btn" onclick="doLogout()">
      <i class="fas fa-right-from-bracket"></i> Logout
    </button>
  </header>
 
  <!-- ══════════ BODY ══════════ -->
  <div class="dash-body">
 
    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
 
      <div class="section-lbl">Add Credential</div>
 
      <input
        class="add-input" type="text" id="a_site"
        placeholder="Website / App / Game">
 
      <input
        class="add-input" type="text" id="a_user"
        placeholder="Username or Email">
 
      <input
        class="add-input" type="password" id="a_pw"
        placeholder="Password">
 
      <button class="add-btn" onclick="addCredential()">
        <i class="fas fa-plus"></i> Save to Vault
      </button>
 
      <div class="sidebar-sep"></div>
 
      <!-- Stats -->
      <div class="section-lbl">Vault Stats</div>
      <div class="stats-stack">
        <div class="stat-row">
          <span class="s-lbl">Total saved</span>
          <span class="s-num" id="stat_total">0</span>
        </div>
        <div class="stat-row">
          <span class="s-lbl">Unique sites</span>
          <span class="s-num" id="stat_sites">0</span>
        </div>
        <div class="stat-row">
          <span class="s-lbl">Last added</span>
          <span class="s-num small" id="stat_last">—</span>
        </div>
      </div>
 
    </aside>
 
    <!-- ── MAIN VAULT ── -->
    <main class="vault-main">
 
      <div class="vault-header">
        <div class="vault-title">Your Vault</div>
        <div class="vault-actions">
          <div class="search-wrap">
            <i class="fas fa-magnifying-glass"></i>
            <input
              class="search-input" type="text" id="searchQ"
              placeholder="Search site or username…"
              oninput="renderCards()">
          </div>
        </div>
      </div>
 
      <!-- Cards rendered by JS -->
      <div class="cards-grid" id="cardsGrid"></div>
 
    </main>
  </div>
</div>
 
<!-- ══════════ EDIT MODAL ══════════ -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-head">
      <i class="fas fa-pen-to-square"></i> Edit Credential
    </div>
 
    <input type="hidden" id="edit_idx">
 
    <div class="field">
      <label class="field-label">Website / App / Game</label>
      <input class="field-input" type="text" id="edit_site" placeholder="e.g. Gmail">
    </div>
    <div class="field">
      <label class="field-label">Username / Email</label>
      <input class="field-input" type="text" id="edit_user" placeholder="you@email.com">
    </div>
    <div class="field">
      <label class="field-label">Password</label>
      <div class="pw-wrap">
        <input class="field-input" type="password" id="edit_pw" placeholder="••••••••">
        <button class="pw-eye" type="button" onclick="toggleEye('edit_pw',this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>
 
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">
        <i class="fas fa-floppy-disk"></i> &nbsp;Save Changes
      </button>
    </div>
  </div>
</div>
 
<!-- Toast -->
<div class="toast" id="toast"></div>
 
<script src="dashboard.js"></script>
<script>
  /* Light/dark toggle (persisted) */
  function toggleTheme() {
    document.body.classList.toggle('light');
    localStorage.setItem('sv_theme', document.body.classList.contains('light') ? 'light' : 'dark');
  }
 
  /* Apply saved theme on load */
  (function applyTheme() {
    if (localStorage.getItem('sv_theme') === 'light') {
      document.body.classList.add('light');
    }
  })();
</script>
</body>
</html>
